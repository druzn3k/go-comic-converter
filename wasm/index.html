<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Comic Converter — WASM</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --border: #ddd;
    --text: #333;
    --accent: #4a90d9;
    --accent-hover: #357abd;
    --error: #d32f2f;
    --success: #2e7d32;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 20px; }

  /* Drop zone */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    background: var(--card);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 20px;
  }
  #dropzone.dragover { border-color: var(--accent); background: #eef5ff; }
  #dropzone.has-file { border-color: var(--success); border-style: solid; background: #f0faf0; }
  #dropzone .icon { font-size: 2rem; margin-bottom: 8px; }
  #dropzone .filename { font-weight: 600; color: var(--success); }

  /* Loading overlay */
  #loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85);
             align-items: center; justify-content: center; z-index: 100; flex-direction: column; }
  #loading.active { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border);
             border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #progress-text { margin-top: 16px; font-size: 0.95rem; color: #555; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: #555; }

  /* Form */
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 3px; font-weight: 500; }
  .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field-row .field { flex: 1; min-width: 120px; }
  input[type="text"], input[type="number"], select {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 5px; font-size: 0.9rem; background: #fff; }
  input[type="checkbox"] { margin-right: 6px; }
  .checkbox-group label { display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.85rem; cursor: pointer; margin-right: 12px; }

  /* Buttons */
  .btn-primary {
    display: block; width: 100%; padding: 12px; background: var(--accent);
    color: #fff; border: none; border-radius: 8px; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

  /* Result */
  #result { display: none; margin-top: 16px; padding: 16px; border-radius: 8px; }
  #result.success { display: block; background: #f0faf0; border: 1px solid #a5d6a7; }
  #result.error { display: block; background: #fff0f0; border: 1px solid #ef9a9a; }
  #result a { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <h1>Go Comic Converter</h1>
  <p class="subtitle">Convert CBZ/CBR/PDF to EPUB in your browser. All processing is local — no files are uploaded to any server.</p>

  <!-- Drop zone -->
  <div id="dropzone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📂</div>
    <div id="dropzone-text">Drop a comic file here, or click to browse</div>
    <div style="font-size:0.8rem;color:#999;margin-top:4px">Supports CBZ, ZIP, CBR, RAR, PDF</div>
    <input type="file" id="fileInput" accept=".cbz,.zip,.cbr,.rar,.pdf" style="display:none">
  </div>

  <!-- Options form -->
  <div class="card">
    <h2>Output</h2>
    <div class="field-row">
      <div class="field">
        <label>Output format</label>
        <select id="outputFormat">
          <option value="epub">EPUB</option>
          <option value="kepub">KEPUB (Kobo)</option>
          <option value="cbz">CBZ</option>
          <option value="html">HTML</option>
        </select>
      </div>
      <div class="field">
        <label>Image format</label>
        <select id="imageFormat">
          <option value="jpeg">JPEG</option>
          <option value="png">PNG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
      <div class="field">
        <label>Quality (1–100)</label>
        <input type="number" id="quality" value="85" min="1" max="100">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Profile</label>
        <select id="profile">
          <option value="SR">SR — Standard (1200×1920)</option>
          <option value="HR">HR — High Res (2400×3840)</option>
          <option value="KV">KV — Kindle Paperwhite 3/4/Voyage</option>
          <option value="KPW5">KPW5 — Kindle Paperwhite 5</option>
          <option value="KO">KO — Kindle Oasis 2/3</option>
          <option value="KS">KS — Kindle Scribe</option>
          <option value="RM1">RM1 — reMarkable 1</option>
          <option value="RM2">RM2 — reMarkable 2</option>
        </select>
      </div>
      <div class="field">
        <label>Title (optional)</label>
        <input type="text" id="title" placeholder="Auto from filename">
      </div>
      <div class="field">
        <label>Author (optional)</label>
        <input type="text" id="author" placeholder="GO Comic Converter">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Image Processing</h2>
    <div class="field-row">
      <div class="field">
        <label>Brightness (−100 to 100)</label>
        <input type="number" id="brightness" value="0" min="-100" max="100">
      </div>
      <div class="field">
        <label>Contrast (−100 to 100)</label>
        <input type="number" id="contrast" value="0" min="-100" max="100">
      </div>
      <div class="field">
        <label>Aspect ratio</label>
        <select id="aspectRatio">
          <option value="-1">Device</option>
          <option value="0">Source</option>
          <option value="1.6">1:1.6 (Kindle)</option>
        </select>
      </div>
    </div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="grayscale" checked> Grayscale</label>
      <label><input type="checkbox" id="crop" checked> Auto crop</label>
      <label><input type="checkbox" id="autoContrast"> Auto contrast</label>
      <label><input type="checkbox" id="autoRotate"> Auto rotate</label>
      <label><input type="checkbox" id="autoSplitDouble" checked> Auto split double page</label>
      <label><input type="checkbox" id="resize" checked> Resize to device</label>
      <label><input type="checkbox" id="noBlankImage" checked> Remove blanks</label>
      <label><input type="checkbox" id="manga"> Manga mode (RTL)</label>
      <label><input type="checkbox" id="hasCover" checked> Has cover</label>
      <label><input type="checkbox" id="portraitOnly"> Portrait only</label>
    </div>
  </div>

  <div class="card">
    <h2>Metadata (ComicInfo.xml)</h2>
    <div class="field-row">
      <div class="field">
        <label>Series</label>
        <input type="text" id="series" placeholder="Series name">
      </div>
      <div class="field">
        <label>Number</label>
        <input type="text" id="number" placeholder="Issue number">
      </div>
      <div class="field">
        <label>Genre</label>
        <input type="text" id="genre" placeholder="Genre">
      </div>
    </div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="mangaTag"> Manga (ComicInfo)</label>
    </div>
  </div>

  <div class="card">
    <h2>Recipe (advanced)</h2>
    <div class="field">
      <label>Built-in recipe (overrides manual options)</label>
      <select id="recipe">
        <option value="">None (use manual settings)</option>
        <option value="manga-standard">Manga Standard</option>
        <option value="manga-old-scan">Manga Old Scan</option>
        <option value="color-comic">Color Comic</option>
        <option value="max-fidelity">Max Fidelity</option>
        <option value="night-mode">Night Mode</option>
      </select>
    </div>
  </div>

  <button class="btn-primary" id="convertBtn" onclick="doConvert()" disabled>Convert</button>

  <div id="result"></div>
  <div id="loading">
    <div class="spinner"></div>
    <div id="progress-text">Starting…</div>
  </div>
</div>

<script src="wasm_exec.js"></script>
<script src="app.js"></script>
</body>
</html>
