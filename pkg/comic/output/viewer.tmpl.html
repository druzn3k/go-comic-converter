<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
#viewer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
#viewer img { max-width: 100%; max-height: 100vh; object-fit: contain; cursor: pointer; }
#counter { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font: 14px/1 monospace; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 12px; user-select: none; }
</style>
</head>
<body>
<div id="viewer"><img id="page" src="" alt="page"></div>
<div id="counter"></div>
<script>
const pages = [{{range .Pages}}"{{.}}",{{end}}];
let current = 0;
const img = document.getElementById('page');
const counter = document.getElementById('counter');
function show(n) { current = (n + pages.length) % pages.length; img.src = pages[current]; counter.textContent = 'Page ' + (current+1) + ' of ' + pages.length; }
document.addEventListener('keydown', function(e) { if(e.key==='ArrowLeft'||e.key==='ArrowUp') show(current-1); else if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') show(current+1); });
(function(){ var sx=0; document.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;}); document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){if(dx>0)show(current-1);else show(current+1);}}); })();
show(0);
</script>
</body>
</html>
