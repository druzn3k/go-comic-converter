apiVersion: 1
name: color-comic
description: For full-color comics - preserves color, applies auto contrast and resize
filters:
  - name: auto_crop
    params:
      left: 1
      up: 1
      right: 1
      bottom: 3
  - name: auto_contrast
  - name: resize
    params:
      width: 1200
      height: 1920
      mode: 0
