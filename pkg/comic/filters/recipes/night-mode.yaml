apiVersion: 1
name: night-mode
description: Optimized for dark background reading with luminance grayscale
filters:
  - name: auto_crop
    params:
      left: 1
      up: 1
      right: 1
      bottom: 3
  - name: auto_contrast
  - name: grayscale
    params:
      mode: 2
  - name: resize
    params:
      width: 1200
      height: 1920
      mode: 0
